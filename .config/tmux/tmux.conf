# ─── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin "tmux-plugins/tpm"

# tmux-resurrect
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @resurrect-save "M"
set -g @resurrect-restore "R"

# tmux-continuum
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-boot "on"
set -g @continuum-boot-options 'Ghostty'
# set -g @continuum-restore "on"

# tmux-fuzzback
set -g @plugin "roosta/tmux-fuzzback"
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size "90%"

# tmux-logging
set -g @plugin "tmux-plugins/tmux-logging"
set -g @logging-path "$HOME/.tmux/logs"

# ─── Terminal ──────────────────────────────────────────────────────────────────
# Tell tmux that outside terminal supports true color.
# set-environment -g TERM "Ghostty"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ─── General ───────────────────────────────────────────────────────────────────
# Use system clipboard instead of tmux's buffer.
set-option -g set-clipboard on

# No delay after Esc, matters inside nvim.
set -sg escape-time 0
# Let terminal apps see pane focus (nvim autoread, cursor shape).
set -g focus-events on
set -g display-time 4000 # ms

# ─── Mouse & Copy Mode ─────────────────────────────────────────────────────────
# macOS only
set -g mouse on
set -g history-limit 50000
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X scroll-up' 'select-pane -t=; copy-mode -e; send-keys -X scroll-up'"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X scroll-down' 'select-pane -t='"
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind -T copy-mode-vi C-WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-vi C-WheelDownPane send-keys -X halfpage-down
# Use vim keybindings in copy mode.
setw -g mode-keys vi
# Update default binding of `Enter` to also use copy-pipe.
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Keybindings ───────────────────────────────────────────────────────────────
# Clear buffer history and send a carriage return so that the prompt appears.
bind-key N send-keys -R ^M \; clear-history
# Clear history.
bind -n C-l send-keys C-l \;

# Switch panes with arrow keys.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch window place.
bind-key < swap-window -t -
bind-key > swap-window -t +

# Disable confirmation on kill windows/panes.
bind-key & kill-window
bind-key x kill-pane

# Keep current pwd when splitting panes.
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
# New windows open in $HOME.
bind c new-window -c "$HOME"

# Sync all panes.
# bind C-Y set-window-option synchronize-panes
bind -n C-y setw synchronize-panes

# Pane manager (resize + swap) — launched via cmd+\ in Ghostty.
bind-key '|' display-popup -E -w 62 -h 22 "exec $HOME/workspace/scripts/tmux-pane-manager/tmux-pane-manager"

# tmux-yoink — launched via cmd+y in Ghostty.
bind-key Y capture-pane -S - -b yoink \; display-popup -E -w 80% -h 80% "tmux show-buffer -b yoink | $HOME/workspace/scripts/tmux-yoink/tmux-yoink"

# Lazygit — launched via cmd+g in Ghostty.
bind-key G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# gh-dash — launched via cmd+shift+g in Ghostty.
bind-key D display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "gh dash"

# Session picker — launched via cmd+k in Ghostty.
bind-key "K" display-popup -E -w 40% -h 30% -d "#{pane_current_path}" "session=\$(tv tmux-sessions) && [ -n \"\$session\" ] && tmux switch-client -t \"\$session\""

# Brew packages — launched via cmd+b in Ghostty.
bind-key "B" display-popup -E -w 50% -h 80% -d "#{pane_current_path}" "tv brew-packages"

# Weather details popup (overrides default choose-tree on w).
bind-key w display-popup -E -B -w 50 -h 22 "set -a; . $HOME/workspace/dotfiles/.config/tmux/scripts/weather/.env; set +a; exec $HOME/workspace/scripts/tmux-weather/tmux-weather"

# ─── Windows & Panes ───────────────────────────────────────────────────────────
setw -g monitor-activity on

# Prevent tmux exit when closing a session.
set -g detach-on-destroy off

set-option -g renumber-windows on

# Start windows/panes at index 1.
set -g base-index 1
setw -g pane-base-index 1

# Panes renaming based on path.
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}}'
# set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"

# ─── Theme ─────────────────────────────────────────────────────────────────────
set-option -g status "on"
# Default statusbar color
set-option -g status-style bg=colour237,fg=colour223
# Default window title colors
set-window-option -g window-status-style bg=yellow,fg=colour237
# Default window with an activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248
# Active window title colors
set-window-option -g window-status-current-style bg=green,fg=colour237
# Pane border
set-option -g pane-active-border-style fg=green
set-option -g pane-border-style fg=colour237
# Message infos
set-option -g message-style bg=colour239,fg=colour223
# Writing commands inactive.
set-option -g message-command-style bg=colour239,fg=colour223
# Pane number display
set-option -g display-panes-colour colour237
set-option -g display-panes-active-colour colour250
# Clock
set-window-option -g clock-mode-colour colour109

# Bell
# set-window-option -g window-status-bell-style bg=colour167,fg=colour235

# Status bar
set-option -g status-left "#[bg=colour241,fg=colour248] #S #[bg=colour237,fg=colour241,nobold,noitalics,nounderscore]"
set-option -g status-right "#[fg=colour246]#(~/workspace/dotfiles/.config/tmux/scripts/nowplaying/nowplaying.sh) #(~/workspace/dotfiles/.config/tmux/scripts/tmux-plugin-colima-status.sh)#(~/workspace/dotfiles/.config/tmux/scripts/tmux-plugin-gh-prs.sh)#[bg=colour237,fg=colour239 nobold, nounderscore, noitalics]#[bg=colour239,fg=colour246]#(~/workspace/dotfiles/.config/tmux/scripts/tmux-plugin-battery.sh) #(~/workspace/dotfiles/.config/tmux/scripts/weather/weather.sh)  %a %d/%m #[bg=colour239,fg=colour248,nobold,noitalics,nounderscore]#[bg=colour248,fg=colour237] %H:%M:%S #(~/workspace/dotfiles/.config/tmux/scripts/tmux-plugin-online-status.sh)"
set-option -g status-right-length 200
set-window-option -g window-status-format "#[bg=colour239,fg=colour237,noitalics]#[bg=colour239,fg=colour248] #I #[bg=colour239,fg=colour237]#[bg=colour239,fg=colour248] #W #[bg=colour237,fg=colour239,noitalics]"
set-window-option -g window-status-current-format "#[bg=green,fg=colour237,nobold,noitalics,nounderscore]#[bg=green,fg=colour239] #I #[bg=green,fg=colour239,bold] #W#{?window_zoomed_flag, 🔍,} #[bg=colour237,fg=green,nobold,noitalics,nounderscore]"

# Workaround for slow tmux thumb start up.
set -g visual-activity off
set -g visual-bell off
set -g visual-silence on

# ─── End ───────────────────────────────────────────────────────────────────────
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf).
run '~/.tmux/plugins/tpm/tpm'
