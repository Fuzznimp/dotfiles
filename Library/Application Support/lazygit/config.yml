gui:
  showIcons: true
  showCommandLog: true
  commandLogSize: 8
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - black
    selectedLineBgColor:
      - "#303030"
    optionsTextColor:
      - "#e78a4e"
os:
  open: "zed {{filename}}"
  openDirInEditor: "zed {{dir}}"
keybinding:
  universal:
    focusMainView: '6'
git:
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium --oneline {{branchName}} --"
customCommands:
  # Override 'o' (open PR): script sets title from first commit + Overview/Demo body,
  # opens browser prefilled.
  - key: "o"
    context: "localBranches"
    description: "Create PR using custom script"
    command: "$HOME/workspace/dotfiles/scripts/gh-pr-create.sh"
    output: terminal
